<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL AI Analyst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #151821;
    --card:      #1c2030;
    --border:    #2a2f45;
    --accent:    #6366f1;
    --accent2:   #818cf8;
    --green:     #10b981;
    --amber:     #f59e0b;
    --red:       #ef4444;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Inter', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 56px 1fr;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 16px;
  }
  .logo-text { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
  .logo-text span { color: var(--accent2); }
  .header-badge {
    margin-left: auto;
    background: rgba(99,102,241,0.15);
    color: var(--accent2);
    border: 1px solid rgba(99,102,241,0.3);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    margin-left: 8px;
  }

  /* ── Sidebar ── */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sidebar-section {
    padding: 0 16px;
    margin-bottom: 8px;
  }
  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .table-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .table-chip:hover { background: var(--card); border-color: var(--border); }
  .table-chip.active { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.3); color: var(--accent2); }
  .table-icon { font-size: 14px; }
  .table-count {
    margin-left: auto;
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .suggestion-btn {
    width: 100%;
    text-align: left;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-family: var(--sans);
    cursor: pointer;
    margin-bottom: 6px;
    line-height: 1.4;
    transition: all 0.15s;
  }
  .suggestion-btn:hover {
    border-color: var(--accent);
    background: rgba(99,102,241,0.08);
    color: var(--accent2);
  }

  /* ── Main ── */
  main {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 56px);
    min-height: 0;
    overflow: hidden;
  }

  .results-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px 0;
    flex-shrink: 0;
  }
  .results-count {
    font-size: 12px;
    color: var(--muted);
  }
  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    font-family: var(--sans);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .clear-btn:hover { color: var(--text); border-color: var(--accent); }

  /* ── Results area ── */
  #results {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .empty-state {
    margin: auto;
    text-align: center;
    max-width: 440px;
    padding: 40px;
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .empty-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }

  /* ── Result card ── */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: visible;
    flex-shrink: 0;
    animation: slideIn 0.25s ease;
  }
  .result-card.collapsed .result-body { display: none; }
  .result-card.collapsed .collapse-icon { transform: rotate(-90deg); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .result-card.collapsed .result-header { border-bottom: none; }
  .collapse-icon {
    color: var(--muted);
    font-size: 10px;
    margin-top: 4px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .result-body { }
  .result-q {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
  }
  .result-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .result-tabs {
    display: flex;
    gap: 2px;
    padding: 12px 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    font-family: var(--sans);
    padding: 6px 12px;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    transition: all 0.15s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent); background: rgba(99,102,241,0.06); }

  .tab-panel { display: none; padding: 16px; min-height: 200px; }
  .tab-panel.active { display: block; }

  /* Chart */
  .chart-wrap {
    position: relative;
    height: 360px;
    width: 100%;
  }

  /* Table */
  .data-table-wrap { overflow: auto; max-height: 420px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--surface);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 8px 12px;
    text-align: left;
    position: sticky; top: 0;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(42,47,69,0.5);
    font-family: var(--mono);
    font-size: 12px;
  }
  tr:hover td { background: rgba(99,102,241,0.04); }

  /* SQL panel */
  .sql-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
    color: #a5b4fc;
  }
  .sql-keyword { color: #f472b6; }
  .copy-btn {
    float: right;
    background: rgba(99,102,241,0.12);
    border: 1px solid rgba(99,102,241,0.2);
    color: var(--accent2);
    font-size: 11px;
    font-family: var(--sans);
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: -2px;
    transition: background 0.15s;
  }
  .copy-btn:hover { background: rgba(99,102,241,0.25); }

  /* Insight */
  .insight-box {
    background: linear-gradient(135deg, rgba(16,185,129,0.06), rgba(99,102,241,0.06));
    border: 1px solid rgba(16,185,129,0.2);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.7;
    color: #cbd5e1;
  }
  .insight-icon { color: var(--green); margin-right: 6px; }

  /* Row count pill */
  .row-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(99,102,241,0.12);
    color: var(--accent2);
    border: 1px solid rgba(99,102,241,0.2);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-family: var(--mono);
  }

  /* ── Input bar ── */
  .input-bar {
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-wrap {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 14px;
    transition: border-color 0.15s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: var(--sans);
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }
  textarea::placeholder { color: var(--muted); }
  .send-btn {
    background: var(--accent);
    border: none;
    color: white;
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: grid; place-items: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover { background: var(--accent2); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Loading skeleton */
  .skeleton-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .skel { background: var(--border); border-radius: 4px; margin-bottom: 10px; }

  /* Error state */
  .error-card {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 12px;
    padding: 16px;
    font-size: 13px;
    color: #fca5a5;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  #results { scrollbar-color: var(--border) var(--surface); scrollbar-width: thin; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo-icon">🔍</div>
  <div class="logo-text">SQL <span>AI</span> Analyst</div>
  <div class="header-badge">LangChain · Claude API</div>
  <div id="status-dot" title="Connected"></div>
</header>

<!-- Sidebar -->
<aside>
  <div class="sidebar-section">
    <div class="sidebar-label">Database Tables</div>
    <div id="tables-list">
      <div style="color:var(--muted);font-size:12px;padding:8px 0;">Loading…</div>
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Try asking</div>
    <button class="suggestion-btn" onclick="fillPrompt(this)">What were the top 5 products by total revenue last year?</button>
    <button class="suggestion-btn" onclick="fillPrompt(this)">Show monthly sales trend for 2024</button>
    <button class="suggestion-btn" onclick="fillPrompt(this)">Which region has the highest average order value?</button>
    <button class="suggestion-btn" onclick="fillPrompt(this)">Compare revenue by sales channel</button>
    <button class="suggestion-btn" onclick="fillPrompt(this)">Which marketing campaign had the best ROI?</button>
    <button class="suggestion-btn" onclick="fillPrompt(this)">Show customer segment distribution</button>
  </div>
</aside>

<!-- Main -->
<main>
  <div class="results-toolbar" id="results-toolbar" style="display:none">
    <span class="results-count" id="results-count">0 results</span>
    <button class="clear-btn" onclick="clearResults()">Clear all</button>
  </div>
  <div id="results">
    <div class="empty-state" id="empty">
      <div class="empty-icon">📊</div>
      <div class="empty-title">Ask anything about your data</div>
      <div class="empty-sub">Type a question in plain English. The AI generates the SQL, runs it, and visualizes the result — no SQL knowledge needed.</div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="question" rows="1" placeholder="e.g. What were the top 10 customers by revenue in Q4 2024?" 
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="submitQuery()" title="Send (Enter)">
      ➤
    </button>
  </div>
</main>

<script>
const API = '';   // same origin
let history = [];
let chartInstances = {};

// ── Init ──────────────────────────────────────────────────────────────────
async function loadTables() {
  try {
    const res = await fetch(`${API}/api/tables`);
    const { tables } = await res.json();
    const icons = { sales: '💰', products: '📦', customers: '👥', marketing: '📣' };
    document.getElementById('tables-list').innerHTML = tables.map(t => `
      <div class="table-chip" onclick="previewTable('${t.name}', this)">
        <span class="table-icon">${icons[t.name] || '🗃️'}</span>
        <span>${t.name}</span>
        <span class="table-count">${t.rows.toLocaleString()}</span>
      </div>`).join('');
  } catch(e) {
    console.error('Could not load tables:', e);
    document.getElementById('status-dot').style.background = '#ef4444';
    document.getElementById('status-dot').style.boxShadow = '0 0 6px #ef4444';
  }
}

async function previewTable(name, el) {
  document.querySelectorAll('.table-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const q = `Show me a sample of the ${name} table`;
  document.getElementById('question').value = q;
  autoResize(document.getElementById('question'));
}

// ── Query ─────────────────────────────────────────────────────────────────
async function submitQuery() {
  const input = document.getElementById('question');
  const question = input.value.trim();
  if (!question) return;

  document.getElementById('empty')?.remove();
  input.value = '';
  autoResize(input);
  document.getElementById('send-btn').disabled = true;

  const skeletonId = 'skel-' + Date.now();
  appendSkeleton(skeletonId, question);

  try {
    const res = await fetch(`${API}/api/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, history: history.slice(-4) })
    });

    const data = await res.json();
    document.getElementById(skeletonId)?.remove();

    if (!res.ok) throw new Error(data.detail || 'Unknown error');

    history.push({ question, sql: data.sql });
    renderResult(question, data);
  } catch(err) {
    document.getElementById(skeletonId)?.remove();
    renderError(question, err.message);
  } finally {
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

// ── Render ────────────────────────────────────────────────────────────────
function toggleCard(cardId) {
  const card = document.getElementById(cardId);
  if (!card) return;
  card.classList.toggle('collapsed');
  if (!card.classList.contains('collapsed') && chartInstances[cardId]) {
    setTimeout(() => chartInstances[cardId].resize(), 50);
  }
}

function collapseOtherCards(activeCardId) {
  document.querySelectorAll('.result-card').forEach(c => {
    if (c.id !== activeCardId) c.classList.add('collapsed');
  });
}

function updateResultsToolbar() {
  const count = document.querySelectorAll('.result-card').length;
  const toolbar = document.getElementById('results-toolbar');
  const label = document.getElementById('results-count');
  if (count > 0) {
    toolbar.style.display = 'flex';
    label.textContent = `${count} result${count !== 1 ? 's' : ''} — scroll to see all`;
  } else {
    toolbar.style.display = 'none';
  }
}

function clearResults() {
  document.querySelectorAll('.result-card, .error-card').forEach(el => el.remove());
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
  history = [];
  updateResultsToolbar();
  const empty = document.createElement('div');
  empty.className = 'empty-state';
  empty.id = 'empty';
  empty.innerHTML = `
    <div class="empty-icon">📊</div>
    <div class="empty-title">Ask anything about your data</div>
    <div class="empty-sub">Type a question in plain English. The AI generates the SQL, runs it, and visualizes the result — no SQL knowledge needed.</div>`;
  document.getElementById('results').appendChild(empty);
}

function scrollResultsToBottom() {
  const results = document.getElementById('results');
  requestAnimationFrame(() => {
    results.scrollTop = results.scrollHeight;
  });
}

function renderResult(question, data) {
  const cardId = 'card-' + Date.now();
  const card = document.createElement('div');
  card.className = 'result-card';
  card.id = cardId;

  const hasChart = data.chart && data.chart.type !== 'table' && data.rows.length > 0;

  card.innerHTML = `
    <div class="result-header" onclick="toggleCard('${cardId}')">
      <span class="collapse-icon">▼</span>
      <div>
        <div class="result-q">💬 ${escHtml(question)}</div>
        <div class="result-meta">
          <span class="row-pill">📋 ${data.row_count} row${data.row_count !== 1 ? 's' : ''}</span>
        </div>
      </div>
    </div>
    <div class="result-body">
      <div class="result-tabs">
        ${hasChart ? `<button class="tab-btn active" onclick="event.stopPropagation(); switchTab('${cardId}','chart',this)">📊 Chart</button>` : ''}
        <button class="tab-btn ${!hasChart ? 'active' : ''}" onclick="event.stopPropagation(); switchTab('${cardId}','table',this)">📋 Table</button>
        <button class="tab-btn" onclick="event.stopPropagation(); switchTab('${cardId}','sql',this)">⚡ SQL</button>
        <button class="tab-btn" onclick="event.stopPropagation(); switchTab('${cardId}','insight',this)">💡 Insight</button>
      </div>
      ${hasChart ? `
      <div class="tab-panel active" id="${cardId}-chart">
        <div class="chart-wrap">
          <canvas id="canvas-${cardId}"></canvas>
        </div>
      </div>` : ''}
      <div class="tab-panel ${!hasChart ? 'active' : ''}" id="${cardId}-table">
        <div class="data-table-wrap">${buildTable(data.rows, data.columns)}</div>
      </div>
      <div class="tab-panel" id="${cardId}-sql">
        <button class="copy-btn" onclick="copySql('${cardId}')">Copy</button>
        <div class="sql-block" id="sql-${cardId}">${highlightSql(data.sql)}</div>
      </div>
      <div class="tab-panel" id="${cardId}-insight">
        <div class="insight-box"><span class="insight-icon">✦</span>${escHtml(data.insight)}</div>
      </div>
    </div>
  `;

  collapseOtherCards(cardId);
  document.getElementById('results').appendChild(card);
  updateResultsToolbar();
  scrollResultsToBottom();

  if (hasChart) {
    setTimeout(() => renderChart(cardId, data), 80);
  }
}

function renderChart(cardId, data) {
  const cfg = data.chart;
  const canvas = document.getElementById('canvas-' + cardId);
  if (!canvas) return;

  const labels = data.rows.map(r => String(r[cfg.x_col] ?? ''));
  const values = data.rows.map(r => parseFloat(r[cfg.y_col]) || 0);

  const colors = {
    bar: 'rgba(99,102,241,0.75)',
    line: 'rgba(16,185,129,0.85)',
    pie: ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899'],
  };

  const chartCfg = {
    bar: {
      type: 'bar',
      data: {
        labels,
        datasets: [{ label: cfg.y_col, data: values, backgroundColor: colors.bar,
          borderRadius: 6, borderSkipped: false }]
      },
    },
    line: {
      type: 'line',
      data: {
        labels,
        datasets: [{ label: cfg.y_col, data: values, borderColor: colors.line,
          backgroundColor: 'rgba(16,185,129,0.08)', tension: 0.4, pointRadius: 3,
          pointBackgroundColor: colors.line, fill: true }]
      }
    },
    pie: {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{ data: values, backgroundColor: colors.pie,
          borderWidth: 2, borderColor: '#1c2030' }]
      }
    },
    scatter: {
      type: 'scatter',
      data: {
        datasets: [{ label: `${cfg.x_col} vs ${cfg.y_col}`,
          data: data.rows.map(r => ({ x: parseFloat(r[cfg.x_col]), y: parseFloat(r[cfg.y_col]) })),
          backgroundColor: 'rgba(99,102,241,0.6)', pointRadius: 5 }]
      }
    }
  };

  const chosen = chartCfg[cfg.type] || chartCfg.bar;

  const ctx = canvas.getContext('2d');
  if (chartInstances[cardId]) chartInstances[cardId].destroy();
  chartInstances[cardId] = new Chart(ctx, {
    ...chosen,
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { family: 'Inter', size: 12 } } },
        title: { display: !!cfg.title, text: cfg.title,
          color: '#e2e8f0', font: { family: 'Inter', size: 14, weight: '600' } }
      },
      scales: cfg.type === 'pie' ? {} : {
        x: { ticks: { color: '#64748b', font: { family: 'Inter', size: 11 } },
          grid: { color: 'rgba(42,47,69,0.6)' } },
        y: { ticks: { color: '#64748b', font: { family: 'Inter', size: 11 } },
          grid: { color: 'rgba(42,47,69,0.6)' } }
      }
    }
  });
}

function buildTable(rows, cols) {
  if (!rows.length) return '<div style="color:var(--muted);font-size:13px;padding:8px">No rows returned.</div>';
  return `<table>
    <thead><tr>${cols.map(c => `<th>${escHtml(c)}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r =>
      `<tr>${cols.map(c => `<td>${escHtml(String(r[c] ?? ''))}</td>`).join('')}</tr>`
    ).join('')}</tbody>
  </table>`;
}

function renderError(question, msg) {
  collapseOtherCards(null);
  const el = document.createElement('div');
  el.className = 'error-card';
  el.innerHTML = `
      <span>⚠️</span>
      <div>
        <div style="font-weight:600;margin-bottom:4px">Error for: "${escHtml(question)}"</div>
        <div>${escHtml(msg)}</div>
      </div>`;
  document.getElementById('results').appendChild(el);
  updateResultsToolbar();
  scrollResultsToBottom();
}

function appendSkeleton(id, question) {
  const el = document.createElement('div');
  el.id = id;
  el.innerHTML = `
    <div class="skeleton-card">
      <div style="font-size:13px;color:var(--muted);margin-bottom:14px">⏳ Analyzing: "${escHtml(question)}"</div>
      <div class="skel" style="height:12px;width:70%"></div>
      <div class="skel" style="height:12px;width:50%"></div>
      <div class="skel" style="height:120px;width:100%;margin-top:16px"></div>
    </div>`;
  document.getElementById('results').appendChild(el);
  scrollResultsToBottom();
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function switchTab(cardId, tab, btn) {
  const card = document.getElementById(cardId);
  card.classList.remove('collapsed');
  card.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  card.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const panel = document.getElementById(`${cardId}-${tab}`);
  if (panel) panel.classList.add('active');
  if (tab === 'chart' && chartInstances[cardId]) {
    chartInstances[cardId].resize();
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────
function highlightSql(sql) {
  const keywords = /\b(SELECT|FROM|WHERE|GROUP BY|ORDER BY|HAVING|JOIN|LEFT|RIGHT|INNER|ON|AS|AND|OR|NOT|IN|LIKE|BETWEEN|CASE|WHEN|THEN|ELSE|END|LIMIT|OFFSET|WITH|UNION|INSERT|UPDATE|DELETE|COUNT|SUM|AVG|MAX|MIN|DISTINCT|BY|DESC|ASC|NULL|IS|ROUND|CAST|COALESCE|strftime)\b/g;
  return escHtml(sql).replace(keywords, '<span class="sql-keyword">$1</span>');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copySql(cardId) {
  const el = document.getElementById('sql-' + cardId);
  navigator.clipboard.writeText(el.innerText).then(() => {
    const btn = el.previousElementSibling;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

function fillPrompt(btn) {
  const q = document.getElementById('question');
  q.value = btn.textContent.trim();
  autoResize(q);
  q.focus();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitQuery();
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────
loadTables();
document.getElementById('question').focus();
</script>
</body>
</html>
